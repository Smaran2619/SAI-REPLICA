name: Build and Release Flask App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if exist requirements.txt pip install -r requirements.txt

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pyinstaller --onedir --add-data "templates;templates" --add-data "static;static" --add-data "static/webfonts;static/webfonts" app.py

      - name: Build Linux/Mac
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onedir --add-data "templates:templates" --add-data "static:static" --add-data "static/webfonts:static/webfonts" app.py

      - name: Zip build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r app-${{ runner.os }}.zip app

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/app -DestinationPath dist/app-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: dist/*.zip


  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: "**/*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
